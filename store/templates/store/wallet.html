{% extends 'store/base.html' %}
{% block title %} - Wallet{% endblock %}
{% block content %}
    <h2>Your Wallet</h2>
    <p>Your current balance is: <strong>₦{{ wallet_balance|floatformat:2 }}</strong></p>
    <p><a href="{% url 'store:deposit_funds' %}" class="btn btn-success">Add Funds to Wallet</a></p>
{% endblock %}

<style>
    .btn-success {
        background-color: #28a745;
        color: white;
        padding: 0.5rem 1rem;
        border: none;
        border-radius: 4px;
        text-decoration: none;
    }
    .btn-success:hover {
        background-color: #1e7e34;
    }
</style>
